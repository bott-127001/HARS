services:
  - type: web
    name: hars-dashboard
    env: python
    plan: free
    healthCheckPath: /api/health
    buildCommand: "pip install -r requirements.txt && cd frontend && npm ci && npm run build"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: UPSTOX_ANALYTICS_TOKEN
        sync: false
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        sync: false
